<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coleção - ENJOADO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    padding-top:80px;
    background:#f3f4f6;
    color:#1f2937;
}

/* MENU */
.topo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    background:#1f2937;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    z-index:1000;
}

.logo img{
    height:55px;
    display:block;
}

.menu{
    display:flex;
    align-items:center;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:15px;
    transition:0.3s;
}

.menu a:hover{
    color:#facc15;
}

/* LOJA */
.loja{
    max-width:1200px;
    margin:0 auto;
    padding:40px 20px 60px;
}

.loja h1{
    text-align:center;
    margin-bottom:40px;
    font-size:52px;
    color:#1f2937;
}

/* GRADE */
.produtos{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap:30px;
    flex-wrap:wrap;
}

/* CARD */
.produto{
    width:280px;
    min-height:460px;
    background:#ffffff;
    border-radius:18px;
    box-shadow:0 12px 28px rgba(0,0,0,0.10);
    padding:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.produto:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 34px rgba(0,0,0,0.14);
}

/* ÁREA DA IMAGEM */
.produto-imagem{
    width:100%;
    height:220px;
    border-radius:14px;
    background:#eef2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:22px;
}

.produto-imagem img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* TEXTO */
.produto h3{
    font-size:18px;
    line-height:1.3;
    margin-bottom:10px;
    min-height:48px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.produto p{
    font-size:28px;
    font-weight:bold;
    color:#1f2937;
    margin-bottom:22px;
}

/* BOTÃO */
.botao-comprar{
    margin-top:auto;
    display:inline-block;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:white;
    padding:14px 28px;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    font-size:16px;
    transition:0.25s ease;
    box-shadow:0 10px 18px rgba(0,0,0,0.16);
}

.botao-comprar:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 24px rgba(0,0,0,0.22);
}

/* RESPONSIVO */
@media (max-width: 900px){
    .topo{
        padding:0 18px;
    }

    .menu{
        gap:18px;
    }

    .menu a{
        font-size:14px;
    }

    .loja h1{
        font-size:40px;
    }
}

@media (max-width: 650px){
    body{
        padding-top:110px;
    }

    .topo{
        height:auto;
        padding:12px 15px;
        flex-direction:column;
        gap:10px;
    }

    .menu{
        flex-wrap:wrap;
        justify-content:center;
        gap:14px;
    }

    .loja{
        padding-top:30px;
    }

    .loja h1{
        font-size:32px;
        margin-bottom:28px;
    }

    .produto{
        width:100%;
        max-width:320px;
        min-height:unset;
    }
}
</style>
</head>

<body>

<header class="topo">
    <div class="logo">
        <img src="img/logo.png" alt="Logo ENJOADO">
    </div>

    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="colecao.html">Coleção</a>
        <a href="quemsomos.html">Quem Somos</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<section class="loja">
    <h1>Nossa Coleção</h1>

    <div class="produtos">

        <div class="produto">
            <div class="produto-imagem">
                <img src="img/Colecao.png" alt="Camiseta ENJOADO">
            </div>
            <h3>Camiseta ENJOADO</h3>
            <p>R$49,90</p>
            <a href="compra.html?produto=camiseta" class="botao-comprar">Comprar</a>
        </div>

        <div class="produto">
            <div class="produto-imagem">
                <img src="img/Colecao.png" alt="Moletom ENJOADO">
            </div>
            <h3>Moletom ENJOADO</h3>
            <p>R$99,90</p>
            <a href="compra.html?produto=moletom" class="botao-comprar">Comprar</a>
        </div>

        <div class="produto">
            <div class="produto-imagem">
                <img src="img/Colecao.png" alt="Boné ENJOADO">
            </div>
            <h3>Boné ENJOADO</h3>
            <p>R$39,90</p>
            <a href="compra.html?produto=bone" class="botao-comprar">Comprar</a>
        </div>

    </div>
</section>

</body>
</html>
