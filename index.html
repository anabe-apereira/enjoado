<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENJOADO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    padding-top:80px;
    background:#ffffff;
    color:#1f2937;
}

/* MENU FIXO */
.topo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    background:#1f2937;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    z-index:1000;
}

.logo img{
    height:55px;
    display:block;
}

.menu{
    display:flex;
    align-items:center;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.menu a:hover{
    color:#facc15;
}

/* BANNER */
.banner{
    position:relative;
    height: 790px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.slide{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

.slide.ativo{
    opacity:1;
}

.seta{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:20px;
    color:white;
    padding:10px 50px;
    cursor:pointer;
    z-index:5;
    background:(0,0,0,0.3);
    border-radius:8px;
    transition:0.3s;
    user-select:none;
}
.seta:hover{
    background:rgba(0,0,0,0.55);
}

.esquerda{
    left:20px;
}

.direita{
    right:20px;
}

.banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.banner-texto{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
    padding:20px;
    max-width:800px;
}

.banner-texto h1{
    font-size:56px;
    margin-bottom:18px;
}

.banner-texto p{
    font-size:22px;
    line-height:1.5;
}

/* CONTEÚDO */
.conteudo{
    padding:70px 20px;
    text-align:center;
    max-width:900px;
    margin:0 auto;
}

.conteudo h2{
    font-size:38px;
    margin-bottom:20px;
    color:#1f2937;
}

.conteudo p{
    font-size:20px;
    line-height:1.7;
    color:#4b5563;
}

/* RESPONSIVO */
@media (max-width: 900px){
    .topo{
        padding:0 20px;
    }

    .menu{
        gap:18px;
    }

    .banner{
        height:430px;
    }

    .banner-texto h1{
        font-size:40px;
    }

    .banner-texto p{
        font-size:18px;
    }
}

@media (max-width: 650px){
    body{
        padding-top:110px;
    }

    .topo{
        height:auto;
        padding:12px 15px;
        flex-direction:column;
        gap:10px;
    }

    .menu{
        flex-wrap:wrap;
        justify-content:center;
        gap:14px;
    }

    .banner{
        height:350px;
    }

    .banner-texto h1{
        font-size:30px;
    }

    .banner-texto p{
        font-size:16px;
    }

    .seta{
        font-size:32px;
        padding:8px 14px;
    }

    .conteudo{
        padding:50px 20px;
    }

    .conteudo h2{
        font-size:30px;
    }

    .conteudo p{
        font-size:17px;
    }
}
</style>
</head>

<body>

<header class="topo">
    <div class="logo">
        <img src="img/logo.png" alt="Logo ENJOADO">
    </div>

    <nav class="menu">
        <a href="colecao.html">Coleção</a>
        <a href="quemsomos.html">Quem Somos</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<section class="banner">

    <div class="slide ativo" style="background-image:url('img/1.png')"></div>
    <div class="slide" style="background-image:url('img/2.png')"></div>
    <div class="slide" style="background-image:url('img/3.png')"></div>

    <div class="seta esquerda" onclick="voltar()">❮</div>
    <div class="seta direita" onclick="avancar()">❯</div>

    <div class="banner-texto">
        <h1></h1>
        <p></p>
    </div>

</section>

<section class="conteudo">
    <h2>Nosso propósito</h2>
    <p>
        O ENJOADO nasceu para reunir jovens e adolescentes em momentos especiais de convivência,
        aprendizado, diversão e crescimento espiritual. Aqui queremos construir amizade verdadeira,
        fortalecer a fé e viver experiências marcantes juntos.
    </p>
</section>

<script>
let slide = 0;
let slides = document.querySelectorAll(".slide");

function mostrar(){
    slides.forEach(s => s.classList.remove("ativo"));
    slides[slide].classList.add("ativo");
}

function avancar(){
    slide++;
    if(slide >= slides.length){
        slide = 0;
    }
    mostrar();
}

function voltar(){
    slide--;
    if(slide < 0){
        slide = slides.length - 1;
    }
    mostrar();
}

setInterval(avancar, 4000);
</script>

</body>
</html>
